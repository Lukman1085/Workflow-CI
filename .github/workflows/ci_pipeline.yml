name: MLflow CI Pipeline - Advance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train-and-dockerize:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MLProject

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3

    - name: 2. Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: 3. Install Dependencies
      run: |
        pip install mlflow==2.19.0 scikit-learn pandas numpy

    - name: 4. Run MLflow Project (Training Model)
      # Menjalankan MLproject tanpa environment conda tambahan karena dependencies sudah di-install di langkah 3
      run: |
        mlflow run . --no-conda 

    - name: 5. Save Artifacts to GitHub (Memenuhi Syarat Menyimpan Artefak)
      uses: actions/upload-artifact@v3
      with:
        name: trained-model-artifact
        # Mengunggah direktori model hasil dari modelling.py
        path: ./MLProject/model_dir/ 

    - name: 6. Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 7. Build and Push Docker Image using MLflow
      run: |
        mlflow models build-docker -m model_dir -n ${{ secrets.DOCKER_USERNAME }}/msml-burnout-model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/msml-burnout-model:latest
